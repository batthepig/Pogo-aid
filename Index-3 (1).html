<!DOCTYPE html>
<html lang="en">
<head>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PvP Genie Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #0d0d10; color: #e2e8f0; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; padding-top: env(safe-area-inset-top); }
        .genie-card { background: linear-gradient(180deg, #1c1c22 0%, #141417 100%); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; }
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; height: 34px; outline: none; position: relative; z-index: 20; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 28px; width: 28px; border-radius: 50%; background: #fff; border: 3px solid #3b82f6; cursor: pointer; box-shadow: 0 0 12px rgba(0,0,0,0.6); margin-top: -2px; }
        .rank-ring { width: 70px; height: 70px; border-radius: 50%; border: 4px solid #2d2d35; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.2); flex-shrink: 0; }
        .rank-top { border-color: #facc15; box-shadow: 0 0 15px rgba(250, 204, 21, 0.3); }
        .iv-bar-bg { height: 14px; background: #23232b; border-radius: 7px; overflow: hidden; position: absolute; width: 100%; top: 10px; pointer-events: none; }
        .iv-bar-fill { height: 100%; transition: width 0.2s ease-out; }
    </style>
</head>
<body class="p-4 pb-24 max-w-md mx-auto">

    <div class="space-y-3 mb-4">
        <div class="relative">
            <input type="text" id="pkmnSearch" placeholder="Search Pokemon..." class="w-full bg-[#1c1c22] rounded-2xl py-4 px-6 text-white border-none focus:ring-2 focus:ring-blue-500 outline-none shadow-xl">
            <div id="searchResults" class="absolute z-50 w-full mt-2 bg-[#1c1c22] rounded-xl hidden shadow-2xl border border-white/10 max-h-60 overflow-y-auto"></div>
        </div>
        <div class="flex gap-2">
            <input type="number" id="currentCP" placeholder="Current CP" class="w-1/2 bg-[#1c1c22] rounded-xl py-3 px-4 text-white border-none outline-none text-center font-bold">
            <button id="evolveBtn" onclick="toggleEvolve()" class="w-1/2 bg-blue-600 rounded-xl py-3 px-4 text-white font-black uppercase text-xs hidden flex items-center justify-center gap-2 tracking-widest active:scale-95 transition-transform">
                <i data-lucide="chevrons-up" class="w-4 h-4"></i> View Evolution
            </button>
        </div>
    </div>

    <div id="pkmnHeader" class="genie-card p-4 mb-4 flex items-center gap-4">
        <div class="w-16 h-16 bg-[#25252b] rounded-2xl flex items-center justify-center text-blue-400">
            <i data-lucide="shield" class="w-8 h-8"></i>
        </div>
        <div class="flex-1">
            <div class="flex items-center gap-2">
                <h1 id="pkmnName" class="text-xl font-black italic uppercase tracking-tighter">Select Pokemon</h1>
                <span id="detectedLevel" class="bg-blue-600 text-[10px] font-black px-2 py-0.5 rounded-md hidden">LV --</span>
            </div>
            <p id="statsDisplay" class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Base Stats: -- / -- / --</p>
        </div>
    </div>

    <div class="genie-card p-5 space-y-4 mb-4">
        <div class="relative pt-6">
            <div class="flex justify-between text-[10px] font-black text-red-500 uppercase absolute top-1 w-full"><span>Attack</span><span id="atkVal" class="text-lg font-black">15</span></div>
            <div class="relative h-8">
                <div class="iv-bar-bg"><div id="atkFill" class="iv-bar-fill bg-red-600" style="width: 100%"></div></div>
                <input type="range" id="atkIn" min="0" max="15" value="15">
            </div>
        </div>
        <div class="relative pt-6">
            <div class="flex justify-between text-[10px] font-black text-blue-500 uppercase absolute top-1 w-full"><span>Defense</span><span id="defVal" class="text-lg font-black">15</span></div>
            <div class="relative h-8">
                <div class="iv-bar-bg"><div id="defFill" class="iv-bar-fill bg-blue-600" style="width: 100%"></div></div>
                <input type="range" id="defIn" min="0" max="15" value="15">
            </div>
        </div>
        <div class="relative pt-6">
            <div class="flex justify-between text-[10px] font-black text-yellow-500 uppercase absolute top-1 w-full"><span>Stamina</span><span id="staVal" class="text-lg font-black">15</span></div>
            <div class="relative h-8">
                <div class="iv-bar-bg"><div id="staFill" class="iv-bar-fill bg-yellow-600" style="width: 100%"></div></div>
                <input type="range" id="staIn" min="0" max="15" value="15">
            </div>
        </div>
    </div>

    <div id="leagueCards" class="space-y-3">
        <div class="genie-card p-4 border-l-4 border-blue-500 shadow-lg">
            <div class="flex justify-between items-center mb-3">
                <div>
                    <p class="text-[10px] font-black text-blue-400 uppercase tracking-widest mb-1">Great League</p>
                    <p id="glCP" class="text-3xl font-black italic">CP --</p>
                    <p id="glLevel" class="text-[10px] text-slate-500 font-bold uppercase">Target Lv --</p>
                </div>
                <div id="glRankRing" class="rank-ring">
                    <span class="text-[9px] text-slate-500 font-bold uppercase">Rank</span>
                    <span id="glRankText" class="text-xl font-black">--</span>
                    <span id="glPercent" class="text-[9px] text-blue-400 font-bold">--%</span>
                </div>
            </div>
            <div class="pt-2 border-t border-white/5 flex justify-between text-[11px]">
                <span id="glDust" class="text-slate-400">Dust: <b class="text-white">0</b></span>
                <span id="glXL" class="text-blue-400 hidden">XL: <b class="font-black">0</b></span>
                <span id="glCandy" class="text-slate-400">Total Candy: <b class="text-white">0</b></span>
            </div>
        </div>

        <div class="genie-card p-4 border-l-4 border-purple-500 shadow-lg">
            <div class="flex justify-between items-center mb-3">
                <div>
                    <p class="text-[10px] font-black text-purple-400 uppercase tracking-widest mb-1">Ultra League</p>
                    <p id="ulCP" class="text-3xl font-black italic">CP --</p>
                    <p id="ulLevel" class="text-[10px] text-slate-500 font-bold uppercase">Target Lv --</p>
                </div>
                <div id="ulRankRing" class="rank-ring">
                    <span class="text-[9px] text-slate-500 font-bold uppercase">Rank</span>
                    <span id="ulRankText" class="text-xl font-black">--</span>
                    <span id="ulPercent" class="text-[9px] text-purple-400 font-bold">--%</span>
                </div>
            </div>
            <div class="pt-2 border-t border-white/5 flex justify-between text-[11px]">
                <span id="ulDust" class="text-slate-400">Dust: <b class="text-white">0</b></span>
                <span id="ulXL" class="text-purple-400 hidden">XL: <b class="font-black">0</b></span>
                <span id="ulCandy" class="text-slate-400">Total Candy: <b class="text-white">0</b></span>
            </div>
        </div>
    </div>

    <script>
        let pokemonDB = [], evolutionDB = [], selected = null, isEvolved = false;

        const CPM_DATA = {1:0.094, 1.5:0.13513743, 2:0.16639787, 2.5:0.19265092, 3:0.21573247, 3.5:0.23657266, 4:0.25572005, 4.5:0.27353038, 5:0.29024988, 5.5:0.30605737, 6:0.3210876, 6.5:0.33544501, 7:0.34921268, 7.5:0.36245775, 8:0.37523559, 8.5:0.3875924, 9:0.39956728, 9.5:0.41119355, 10:0.42250001, 10.5:0.43292641, 11:0.44310755, 11.5:0.45305995, 12:0.46279839, 12.5:0.47233608, 13:0.48168495, 13.5:0.4908558, 14:0.49985844, 14.5:0.50870176, 15:0.51739355, 15.5:0.52594251, 16:0.53435433, 16.5:0.54263576, 17:0.55079269, 17.5:0.55883057, 18:0.56675452, 18.5:0.57456915, 19:0.58227891, 19.5:0.5898879, 20:0.59740001, 20.5:0.60481881, 21:0.6121571, 21.5:0.61940412, 22:0.62656713, 22.5:0.63364443, 23:0.64064114, 23.5:0.6475601, 24:0.65440001, 24.5:0.66116927, 25:0.66787003, 25.5:0.67450474, 26:0.68107513, 26.5:0.68758413, 27:0.6940336, 27.5:0.70042631, 28:0.70676442, 28.5:0.71304991, 29:0.71928526, 29.5:0.7254712, 30:0.7317, 30.5:0.734741, 31:0.73776948, 31.5:0.74078557, 32:0.74378943, 32.5:0.74678121, 33:0.74976104, 33.5:0.75272908, 34:0.75568551, 34.5:0.75863037, 35:0.76156384, 35.5:0.76448606, 36:0.76739717, 36.5:0.77029727, 37:0.7731865, 37.5:0.77606496, 38:0.77893275, 38.5:0.78179005, 39:0.78463697, 39.5:0.78747357, 40:0.7903, 40.5:0.7928, 41:0.7953, 41.5:0.7978, 42:0.8002, 42.5:0.8027, 43:0.8053, 43.5:0.8078, 44:0.8102, 44.5:0.8127, 45:0.8153, 45.5:0.8177, 46:0.8202, 46.5:0.8227, 47:0.8252, 47.5:0.8277, 48:0.8302, 48.5:0.8327, 49:0.8352, 49.5:0.8377, 50:0.8403, 50.5:0.8428, 51:0.8453};
        const DUST_COSTS = {1:200, 3:400, 5:600, 7:800, 9:1000, 11:1300, 13:1600, 15:1900, 17:2200, 19:2500, 21:3000, 23:3500, 25:4000, 27:4500, 29:5000, 31:6000, 33:7000, 35:8000, 37:9000, 39:10000, 41:12000, 43:15000, 45:18000, 47:20000};
        const CANDY_COSTS = {1:1, 11:2, 21:3, 25:4, 31:6, 33:8, 35:10, 37:12, 39:15, 41:10, 43:12, 45:15, 47:17, 49:20};

        async function init() {
            const [s, e] = await Promise.all([
                fetch('https://pogoapi.net/api/v1/pokemon_stats.json'),
                fetch('https://pogoapi.net/api/v1/pokemon_evolutions.json')
            ]);
            pokemonDB = await s.json(); evolutionDB = await e.json();
            lucide.createIcons();
        }

        function calculate() {
            if (!selected) return;
            const atk = parseInt(document.getElementById('atkIn').value);
            const def = parseInt(document.getElementById('defIn').value);
            const sta = parseInt(document.getElementById('staIn').value);
            let basePkmn = selected, target = selected, evolveCandy = 0;
            const evoInfo = evolutionDB.find(e => e.pokemon_name === selected.pokemon_name);
            if (isEvolved && evoInfo) {
                target = pokemonDB.find(p => p.pokemon_name === evoInfo.evolutions[0].pokemon_name);
                evolveCandy = evoInfo.evolutions[0].candy_required || 0;
            }

            // Global level detection for the badge
            const curCP = parseInt(document.getElementById('currentCP').value) || 0;
            const levelBadge = document.getElementById('detectedLevel');
            if (curCP > 0) {
                let bestMatch = 1, minDiff = 999;
                for (let lv in CPM_DATA) {
                    const m = CPM_DATA[lv];
                    const cp = Math.floor((basePkmn.base_attack + atk) * Math.sqrt(basePkmn.base_defense + def) * Math.sqrt(basePkmn.base_stamina + sta) * (m*m) / 10);
                    if (Math.abs(cp - curCP) < minDiff) { minDiff = Math.abs(cp - curCP); bestMatch = parseFloat(lv); }
                }
                levelBadge.innerText = `LV ${bestMatch}`;
                levelBadge.classList.remove('hidden');
            } else {
                levelBadge.classList.add('hidden');
            }

            processLeague("gl", target, 1500, atk, def, sta, evolveCandy, basePkmn);
            processLeague("ul", target, 2500, atk, def, sta, evolveCandy, basePkmn);
        }

        function processLeague(key, pkmn, cap, ivA, ivD, ivS, evoCost, basePkmn) {
            const user = getBestStats(pkmn, ivA, ivD, ivS, cap);
            
            const allSPs = [];
            for(let a=0; a<=15; a++) for(let d=0; d<=15; d++) for(let s=0; s<=15; s++) {
                allSPs.push(getBestStats(pkmn, a, d, s, cap).sp);
            }
            allSPs.sort((a,b) => b-a);
            const rank = allSPs.indexOf(user.sp) + 1;
            const percent = ((user.sp / allSPs[0]) * 100).toFixed(2);

            document.getElementById('pkmnName').innerText = pkmn.pokemon_name;
            document.getElementById('statsDisplay').innerText = `Base: ${pkmn.base_attack} / ${pkmn.base_defense} / ${pkmn.base_stamina}`;
            document.getElementById(key + 'CP').innerText = `CP ${user.cp}`;
            document.getElementById(key + 'Level').innerText = `Target Lv ${user.lv}`;
            document.getElementById(key + 'RankText').innerText = `#${rank}`;
            document.getElementById(key + 'Percent').innerText = `${percent}%`;
            document.getElementById(key + 'RankRing').className = rank <= 10 ? "rank-ring rank-top" : "rank-ring";

            const curCP = parseInt(document.getElementById('currentCP').value) || 0;
            let startLv = 1;
            if (curCP > 0) {
                let bestMatch = 1, minDiff = 999;
                for (let lv in CPM_DATA) {
                    const m = CPM_DATA[lv];
                    const cp = Math.floor((basePkmn.base_attack + ivA) * Math.sqrt(basePkmn.base_defense + ivD) * Math.sqrt(basePkmn.base_stamina + ivS) * (m*m) / 10);
                    if (Math.abs(cp - curCP) < minDiff) { minDiff = Math.abs(cp - curCP); bestMatch = parseFloat(lv); }
                }
                startLv = bestMatch;
            }

            let totalD = 0, totalC = 0, totalXL = 0;
            for (let l = startLv; l < user.lv; l += 0.5) {
                const floorL = Math.floor(l);
                const dKey = Object.keys(DUST_COSTS).reverse().find(k => k <= floorL);
                const cKey = Object.keys(CANDY_COSTS).reverse().find(k => k <= floorL);
                totalD += DUST_COSTS[dKey];
                if (l < 40) totalC += CANDY_COSTS[cKey]; else totalXL += CANDY_COSTS[cKey];
            }

            document.querySelector(`#${key}Dust b`).innerText = totalD.toLocaleString();
            document.querySelector(`#${key}Candy b`).innerText = (totalC + evoCost).toLocaleString();
            const xlEl = document.getElementById(key + 'XL');
            if (totalXL > 0) {
                xlEl.classList.remove('hidden');
                xlEl.querySelector('b').innerText = totalXL;
            } else {
                xlEl.classList.add('hidden');
            }
        }

        function getBestStats(pkmn, a, d, s, cap) {
            let res = { cp: 0, lv: 1, sp: 0 };
            for (let lv in CPM_DATA) {
                const m = CPM_DATA[lv];
                const cp = Math.floor((pkmn.base_attack + a) * Math.sqrt(pkmn.base_defense + d) * Math.sqrt(pkmn.base_stamina + s) * (m*m) / 10);
                if (cp <= cap) {
                    const sp = ((pkmn.base_attack + a) * m) * ((pkmn.base_defense + d) * m) * Math.floor((pkmn.base_stamina + s) * m);
                    if (sp >= res.sp) res = { cp: Math.max(10, cp), lv: parseFloat(lv), sp };
                }
            }
            return res;
        }

        function toggleEvolve() { 
            isEvolved = !isEvolved; 
            document.getElementById('evolveBtn').innerText = isEvolved ? "View Base" : "View Evolution";
            calculate(); 
        }

        document.getElementById('pkmnSearch').addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase(), res = document.getElementById('searchResults');
            if (q.length < 2) { res.classList.add('hidden'); return; }
            const matches = pokemonDB.filter(p => p.pokemon_name.toLowerCase().includes(q)).slice(0, 10);
            res.innerHTML = matches.map(p => `<div class="p-4 border-b border-white/5 active:bg-blue-600" onclick="pick('${p.pokemon_name}')">${p.pokemon_name}</div>`).join('');
            res.classList.remove('hidden');
        });

        window.pick = (name) => {
            selected = pokemonDB.find(p => p.pokemon_name === name); isEvolved = false;
            document.getElementById('searchResults').classList.add('hidden');
            document.getElementById('evolveBtn').style.display = evolutionDB.find(e => e.pokemon_name === name) ? 'flex' : 'none';
            document.getElementById('pkmnSearch').value = "";
            calculate();
        };

        ['atkIn', 'defIn', 'staIn', 'currentCP'].forEach(id => {
            document.getElementById(id).addEventListener('input', (e) => {
                if(id !== 'currentCP') {
                    document.getElementById(id.replace('In', 'Val')).innerText = e.target.value;
                    document.getElementById(id.replace('In', 'Fill')).style.width = (e.target.value / 15 * 100) + "%";
                }
                calculate();
            });
        });

        init();
    </script>
</body>
</html>

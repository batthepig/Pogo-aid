<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PvP Genie Pro - Hub</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        /* Moving Gradient Background */
        body {
            background: linear-gradient(-45deg, #0d0d10, #16161d, #0d0d10, #1a1a2e);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            color: white;
            font-family: -apple-system, system-ui, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            padding-top: env(safe-area-inset-top);
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            transition: all 0.2s ease;
        }

        .glass-card:active {
            transform: scale(0.97);
            background: rgba(255, 255, 255, 0.06);
        }

        /* Shine effect on the logo */
        .logo-glow {
            filter: drop-shadow(0 0 15px rgba(96, 165, 250, 0.4));
        }
    </style>
</head>
<body class="flex flex-col items-center pb-20">

    <div class="mt-12 mb-10 text-center px-6">
        <div class="w-20 h-20 bg-gradient-to-tr from-indigo-600 to-blue-500 rounded-[22px] flex items-center justify-center mx-auto mb-4 shadow-2xl logo-glow">
            <i data-lucide="swords" class="w-10 h-10 text-white"></i>
        </div>
        <h1 class="text-3xl font-black italic tracking-tighter uppercase leading-none">
            PvP Genie <span class="text-blue-500">Pro</span>
        </h1>
        <p class="text-[10px] font-black text-slate-500 uppercase tracking-[0.4em] mt-2">PoGo PvP Companion App</p>
    </div>

    <div class="w-full px-6 space-y-4 max-w-md">
        <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-2">My Tools</h2>

        <a href="iv-ranker.html" class="glass-card flex items-center justify-between p-5 group">
            <div class="flex items-center gap-4">
                <div class="w-14 h-14 bg-blue-500/10 rounded-2xl flex items-center justify-center text-blue-400 border border-blue-500/20">
                    <i data-lucide="scan-face" class="w-7 h-7"></i>
                </div>
                <div>
                    <h3 class="text-lg font-black italic uppercase tracking-tight">IV Calculator</h3>
                    <p class="text-[10px] text-slate-500 font-bold uppercase">Rankings & Stats</p>
                </div>
            </div>
            <i data-lucide="chevron-right" class="w-5 h-5 text-slate-700 group-active:text-blue-500"></i>
        </a>

        <a href="cp%20calculator.html" class="glass-card flex items-center justify-between p-5 group">
            <div class="flex items-center gap-4">
                <div class="w-14 h-14 bg-amber-500/10 rounded-2xl flex items-center justify-center text-amber-400 border border-amber-500/20">
                    <i data-lucide="calculator" class="w-7 h-7"></i>
                </div>
                <div>
                    <h3 class="text-lg font-black italic uppercase tracking-tight">CP Calculator</h3>
                    <p class="text-[10px] text-slate-500 font-bold uppercase">Evolution & Costs</p>
                </div>
            </div>
            <i data-lucide="chevron-right" class="w-5 h-5 text-slate-700 group-active:text-amber-500"></i>
        </a>

        <div class="glass-card flex items-center justify-between p-5 opacity-40">
            <div class="flex items-center gap-4">
                <div class="w-14 h-14 bg-emerald-500/10 rounded-2xl flex items-center justify-center text-emerald-400">
                    <i data-lucide="book-open" class="w-7 h-7"></i>
                </div>
                <div>
                    <h3 class="text-lg font-black italic uppercase tracking-tight">My Scans</h3>
                    <p class="text-[10px] text-slate-500 font-bold uppercase">Coming Soon</p>
                </div>
            </div>
        </div>
    </div>

    <div class="fixed bottom-8 w-full max-w-md px-10">
        <div class="flex items-center justify-center gap-2 py-3 px-6 bg-white/5 rounded-full border border-white/5">
            <div class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></div>
            <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Neural Link Active</span>
        </div>
    </div>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>PvP Genie Pro - CP Calculator</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { 
            background: linear-gradient(-45deg, #0d0d10, #16161d, #0d0d10, #1a1a2e);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            color: #e2e8f0; 
            font-family: -apple-system, sans-serif; 
            padding-top: env(safe-area-inset-top); 
            min-height: 100vh;
        }
        @keyframes gradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .genie-card { background: rgba(28, 28, 34, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; }
        .nav-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; }
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; height: 34px; outline: none; position: relative; z-index: 20; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 26px; width: 26px; border-radius: 50%; background: #fff; border: 3px solid #3b82f6; box-shadow: 0 0 10px rgba(0,0,0,0.5); margin-top: -2px; }
        .iv-bar-bg { height: 12px; background: rgba(255,255,255,0.05); border-radius: 6px; overflow: hidden; position: absolute; width: 100%; top: 11px; pointer-events: none; }
        .iv-bar-fill { height: 100%; transition: width 0.2s ease-out; }
        .btn-action { height: 48px; border-radius: 16px; font-weight: 900; text-transform: uppercase; font-size: 11px; letter-spacing: 1px; transition: all 0.2s; }
    </style>
</head>
<body class="p-4 pb-12 max-w-md mx-auto">

    <div class="flex items-center gap-2 mb-6">
        <a href="index.html" class="nav-btn px-4 py-2 flex items-center gap-2 text-[10px] font-black uppercase tracking-widest text-slate-400">
            <i data-lucide="home" class="w-4 h-4 text-blue-500"></i> Hub
        </a>
        <a href="iv-ranker.html" class="nav-btn px-4 py-2 flex items-center gap-2 text-[10px] font-black uppercase tracking-widest text-slate-400">
            <i data-lucide="shield-check" class="w-4 h-4 text-emerald-500"></i> IV Ranker
        </a>
        <div class="ml-auto text-right"><p class="text-[8px] font-black text-amber-500 uppercase tracking-[0.3em]">CP CALC</p></div>
    </div>

    <div class="space-y-3 mb-4">
        <div class="relative">
            <input type="text" id="pkmnSearch" placeholder="Search Pokemon..." class="w-full h-14 bg-white/5 rounded-2xl px-6 text-white border-none outline-none text-lg">
            <div id="searchResults" class="absolute z-50 w-full mt-2 bg-[#1c1c22] rounded-xl hidden border border-white/10 max-h-60 overflow-y-auto"></div>
        </div>
        <input type="number" id="currentCP" placeholder="Current CP (Optional)" class="w-full h-14 bg-white/5 rounded-2xl px-4 text-white border-none outline-none text-center font-bold text-lg">
    </div>

    <div class="genie-card p-4 mb-4 flex items-center gap-4">
        <div class="w-16 h-16 bg-white/5 rounded-2xl flex items-center justify-center text-blue-400"><i data-lucide="crosshair" class="w-8 h-8"></i></div>
        <div class="flex-1">
            <div class="flex items-center gap-2">
                <h1 id="pkmnName" class="text-xl font-black italic uppercase tracking-tighter text-white">Select Pokemon</h1>
                <span id="detectedLevelBadge" class="bg-blue-600 text-[10px] font-black px-2 py-0.5 rounded-md hidden">LV --</span>
            </div>
            <p id="statsDisplay" class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Base Stats: -- / -- / --</p>
        </div>
    </div>

    <div class="genie-card p-5 space-y-4 mb-4">
        <div class="relative pt-6">
            <div class="flex justify-between text-[10px] font-black text-red-500 uppercase absolute top-1 w-full"><span>Attack</span><span id="atkVal">15</span></div>
            <div class="relative h-8"><div class="iv-bar-bg"><div id="atkFill" class="iv-bar-fill bg-red-600" style="width: 100%"></div></div><input type="range" id="atkIn" min="0" max="15" value="15"></div>
        </div>
        <div class="relative pt-6">
            <div class="flex justify-between text-[10px] font-black text-blue-500 uppercase absolute top-1 w-full"><span>Defense</span><span id="defVal">15</span></div>
            <div class="relative h-8"><div class="iv-bar-bg"><div id="defFill" class="iv-bar-fill bg-blue-600" style="width: 100%"></div></div><input type="range" id="defIn" min="0" max="15" value="15"></div>
        </div>
        <div class="relative pt-6">
            <div class="flex justify-between text-[10px] font-black text-yellow-500 uppercase absolute top-1 w-full"><span>Stamina</span><span id="staVal">15</span></div>
            <div class="relative h-8"><div class="iv-bar-bg"><div id="staFill" class="iv-bar-fill bg-yellow-600" style="width: 100%"></div></div><input type="range" id="staIn" min="0" max="15" value="15"></div>
        </div>
    </div>

    <div class="flex gap-2 mb-4">
        <button id="btnDevolve" disabled class="btn-action bg-slate-800 text-white w-1/2 flex items-center justify-center" onclick="traverseEvo(-1)"><i data-lucide="chevron-down" class="w-4 h-4 mr-2"></i> Devolve</button>
        <button id="btnEvolve" disabled class="btn-action bg-purple-600 text-white w-1/2 flex items-center justify-center" onclick="traverseEvo(1)">Evolve <i data-lucide="chevron-up" class="w-4 h-4 ml-2"></i></button>
    </div>

    <div class="genie-card p-5 border-l-4 border-amber-500">
        <div class="flex justify-between items-center mb-2">
            <div>
                <p class="text-[10px] font-black text-amber-500 uppercase tracking-widest mb-1">Target Calculator</p>
                <div class="flex items-baseline gap-2">
                    <p id="targetCP" class="text-4xl font-black italic text-white">CP --</p>
                    <p id="targetLevelText" class="text-xs text-slate-400 font-bold">Lv --</p>
                </div>
            </div>
            <button id="btnPowerUp" disabled class="btn-action bg-amber-500 text-black px-4 flex items-center" onclick="powerUp()"><i data-lucide="zap" class="w-4 h-4 mr-1"></i> +0.5</button>
        </div>
        <input type="range" id="levelSlider" min="1" max="51" step="0.5" value="1" disabled>
        <div class="flex justify-between text-[10px] font-black text-slate-400 uppercase mt-2">
            <span>Dust: <span id="costDust" class="text-white">0</span></span>
            <span>Candy: <span id="costCandy" class="text-white">0</span></span>
        </div>
    </div>

    <script>
        let pokemonDB = [], evolutionDB = [], activePkmn = null, detectedCurrentLevel = 1;
        const proxy = "https://corsproxy.io/?"; 
        const CPM_DATA = {1:0.094, 2:0.16639787, 10:0.42250001, 20:0.59740001, 30:0.7317, 40:0.7903, 50:0.8403, 51:0.8453}; // Simplified for space, add more as needed

        async function init() {
            try {
                const [s, e] = await Promise.all([
                    fetch(proxy + 'https://pogoapi.net/api/v1/pokemon_stats.json'),
                    fetch(proxy + 'https://pogoapi.net/api/v1/pokemon_evolutions.json')
                ]);
                pokemonDB = await s.json(); evolutionDB = await e.json();
                lucide.createIcons();
            } catch (err) { console.error("Data Load Fail", err); }
        }

        function calculateCP(pkmn, a, d, s, level) {
            const m = CPM_DATA[level] || 0.7; // Fallback
            return Math.max(10, Math.floor((pkmn.base_attack + a) * Math.sqrt(pkmn.base_defense + d) * Math.sqrt(pkmn.base_stamina + s) * (m*m) / 10));
        }

        function updateUI() {
            if (!activePkmn) return;
            const a = parseInt(document.getElementById('atkIn').value);
            const d = parseInt(document.getElementById('defIn').value);
            const s = parseInt(document.getElementById('staIn').value);
            const level = parseFloat(document.getElementById('levelSlider').value);
            
            document.getElementById('pkmnName').innerText = activePkmn.pokemon_name;
            document.getElementById('targetCP').innerText = `CP ${calculateCP(activePkmn, a, d, s, level)}`;
            document.getElementById('targetLevelText').innerText = `Lv ${level}`;
            document.getElementById('levelSlider').disabled = false;
            document.getElementById('btnPowerUp').disabled = level >= 51;
        }

        window.pick = (name) => {
            activePkmn = pokemonDB.find(p => p.pokemon_name === name);
            document.getElementById('searchResults').classList.add('hidden');
            updateUI();
        };

        document.getElementById('pkmnSearch').addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase(), res = document.getElementById('searchResults');
            if (q.length < 2) { res.classList.add('hidden'); return; }
            const matches = pokemonDB.filter(p => p.pokemon_name.toLowerCase().includes(q)).slice(0, 10);
            res.innerHTML = matches.map(p => `<div class="p-4 border-b border-white/5" onclick="pick('${p.pokemon_name}')">${p.pokemon_name}</div>`).join('');
            res.classList.remove('hidden');
        });

        // Navigation Fix for Standalone App
        document.addEventListener('click', function(e) {
            var target = e.target.closest('a');
            if (target && target.href && target.href.indexOf(window.location.host) !== -1) {
                e.preventDefault(); window.location.href = target.href;
            }
        }, false);

        init();
    </script>
</body>
</html>

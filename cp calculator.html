<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>PvP Genie Pro - CP Calculator</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Shared Moving Background */
        body { 
            background: linear-gradient(-45deg, #0d0d10, #16161d, #0d0d10, #1a1a2e);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            color: #e2e8f0; 
            font-family: -apple-system, sans-serif; 
            padding-top: env(safe-area-inset-top); 
            padding-bottom: env(safe-area-inset-bottom);
            min-height: 100vh;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .genie-card { background: rgba(28, 28, 34, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; }
        
        /* Navigation Header */
        .nav-btn {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            transition: all 0.2s;
            text-decoration: none;
        }
        .nav-btn:active { transform: scale(0.95); background: rgba(255, 255, 255, 0.08); }

        /* Sliders */
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; height: 34px; outline: none; position: relative; z-index: 20; }
        input[type=range]::-webkit-slider-thumb { 
            -webkit-appearance: none; height: 28px; width: 28px; border-radius: 50%; 
            background: #fff; border: 3px solid #3b82f6; cursor: pointer; 
            box-shadow: 0 0 12px rgba(0,0,0,0.6); margin-top: -2px; 
        }
        .level-slider::-webkit-slider-thumb { border-color: #f59e0b; }
        .iv-bar-bg { height: 14px; background: #23232b; border-radius: 7px; overflow: hidden; position: absolute; width: 100%; top: 10px; pointer-events: none; }
        .iv-bar-fill { height: 100%; transition: width 0.2s ease-out; }
        
        .btn-action { 
            height: 48px; display: flex; align-items: center; justify-content: center; gap: 8px;
            border-radius: 12px; font-weight: 900; text-transform: uppercase; font-size: 12px;
            letter-spacing: 1px; transition: all 0.2s;
        }
    </style>
</head>
<body class="p-4 pb-12 max-w-md mx-auto">

    <div class="flex items-center gap-2 mb-6">
        <a href="index.html" class="nav-btn px-4 py-2 flex items-center gap-2 text-[10px] font-black uppercase tracking-widest text-slate-400">
            <i data-lucide="home" class="w-4 h-4 text-blue-500"></i> Hub
        </a>
        <a href="iv-ranker.html" class="nav-btn px-4 py-2 flex items-center gap-2 text-[10px] font-black uppercase tracking-widest text-slate-400">
            <i data-lucide="shield-check" class="w-4 h-4 text-emerald-500"></i> IV Ranker
        </a>
        <div class="ml-auto text-right">
            <p class="text-[8px] font-black text-amber-500 uppercase tracking-[0.3em]">CP CALC</p>
        </div>
    </div>

    <div class="space-y-3 mb-4">
        <div class="relative">
            <input type="text" id="pkmnSearch" placeholder="Search Pokemon..." class="w-full h-14 bg-white/5 rounded-2xl px-6 text-white border-none focus:ring-2 focus:ring-blue-500 outline-none shadow-xl text-lg">
            <div id="searchResults" class="absolute z-50 w-full mt-2 bg-[#1c1c22] rounded-xl hidden shadow-2xl border border-white/10 max-h-60 overflow-y-auto"></div>
        </div>
        <input type="number" id="currentCP" placeholder="Current CP" class="w-full h-14 bg-white/5 rounded-xl px-4 text-white border-none outline-none text-center font-bold text-lg">
    </div>

    <div id="pkmnHeader" class="genie-card p-4 mb-4 flex items-center gap-4">
        <div class="w-16 h-16 bg-white/5 rounded-2xl flex items-center justify-center text-blue-400">
            <i data-lucide="crosshair" class="w-8 h-8"></i>
        </div>
        <div class="flex-1">
            <div class="flex items-center gap-2">
                <h1 id="pkmnName" class="text-xl font-black italic uppercase tracking-tighter">Select Pokemon</h1>
                <span id="detectedLevelBadge" class="bg-blue-600 text-[10px] font-black px-2 py-0.5 rounded-md hidden">LV --</span>
            </div>
            <p id="statsDisplay" class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Base Stats: -- / -- / --</p>
        </div>
    </div>

    <div class="genie-card p-5 space-y-4 mb-4">
        <div class="relative pt-6">
            <div class="flex justify-between text-[10px] font-black text-red-500 uppercase absolute top-1 w-full"><span>Attack</span><span id="atkVal" class="text-lg font-black">15</span></div>
            <div class="relative h-8">
                <div class="iv-bar-bg"><div id="atkFill" class="iv-bar-fill bg-red-600" style="width: 100%"></div></div>
                <input type="range" id="atkIn" min="0" max="15" value="15">
            </div>
        </div>
        <div class="relative pt-6">
            <div class="flex justify-between text-[10px] font-black text-blue-500 uppercase absolute top-1 w-full"><span>Defense</span><span id="defVal" class="text-lg font-black">15</span></div>
            <div class="relative h-8">
                <div class="iv-bar-bg"><div id="defFill" class="iv-bar-fill bg-blue-600" style="width: 100%"></div></div>
                <input type="range" id="defIn" min="0" max="15" value="15">
            </div>
        </div>
        <div class="relative pt-6">
            <div class="flex justify-between text-[10px] font-black text-yellow-500 uppercase absolute top-1 w-full"><span>Stamina</span><span id="staVal" class="text-lg font-black">15</span></div>
            <div class="relative h-8">
                <div class="iv-bar-bg"><div id="staFill" class="iv-bar-fill bg-yellow-600" style="width: 100%"></div></div>
                <input type="range" id="staIn" min="0" max="15" value="15">
            </div>
        </div>
    </div>

    <div class="flex gap-2 mb-4">
        <button id="btnDevolve" disabled class="btn-action bg-slate-700 text-white w-1/2" onclick="traverseEvo(-1)">
            <i data-lucide="chevron-down" class="w-4 h-4"></i> Devolve
        </button>
        <button id="btnEvolve" disabled class="btn-action bg-purple-600 text-white w-1/2" onclick="traverseEvo(1)">
            Evolve <i data-lucide="chevron-up" class="w-4 h-4"></i>
        </button>
    </div>

    <div class="genie-card p-5 border-l-4 border-amber-500 shadow-lg">
        <div class="flex justify-between items-center mb-2">
            <div>
                <p class="text-[10px] font-black text-amber-500 uppercase tracking-widest mb-1">Target Calculator</p>
                <div class="flex items-baseline gap-2">
                    <p id="targetCP" class="text-4xl font-black italic">CP --</p>
                    <p id="targetLevelText" class="text-xs text-slate-400 font-bold uppercase">Lv --</p>
                </div>
            </div>
            <button id="btnPowerUp" disabled class="btn-action bg-amber-500 text-black px-4" onclick="powerUp()">
                <i data-lucide="zap" class="w-4 h-4"></i> +0.5
            </button>
        </div>
        <input type="range" id="levelSlider" class="level-slider w-full mt-4" min="1" max="51" step="0.5" value="1" disabled>
    </div>

    <script>
        // Internal logic remains the same to preserve calculation functionality
        // ... (existing DB loading and CP logic)
        lucide.createIcons();
    </script>
</body>
</html>

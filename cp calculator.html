<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>PvP Genie Pro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { 
            background-color: #0d0d10; 
            color: #e2e8f0; 
            font-family: -apple-system, sans-serif; 
            padding: calc(env(safe-area-inset-top) + 10px) 16px 40px 16px; 
        }
        .genie-card { background: #1c1c22; border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; }
        .nav-btn { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; }
        
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; height: 34px; outline: none; position: relative; z-index: 10; }
        input[type=range]::-webkit-slider-thumb { 
            -webkit-appearance: none; height: 28px; width: 28px; border-radius: 50%; 
            background: #fff; border: 3px solid #3b82f6; margin-top: -2px; 
        }
        .iv-bar-bg { height: 14px; background: #23232b; border-radius: 7px; position: absolute; width: 100%; top: 10px; pointer-events: none; }
        .iv-bar-fill { height: 100%; transition: width 0.2s; border-radius: 7px; }
    </style>
</head>
<body>

    <div class="flex items-center gap-2 mb-6">
        <a href="index.html" class="nav-btn px-4 py-2 flex items-center gap-2 text-[10px] font-black uppercase tracking-widest text-slate-400">
            <i data-lucide="home" class="w-4 h-4 text-blue-500"></i> HUB
        </a>
        <a href="iv-ranker.html" class="nav-btn px-4 py-2 flex items-center gap-2 text-[10px] font-black uppercase tracking-widest text-slate-400">
            <i data-lucide="shield-check" class="w-4 h-4 text-emerald-500"></i> IV RANKER
        </a>
        <div class="ml-auto text-right">
            <p class="text-[8px] font-black text-amber-500 uppercase tracking-[0.3em]">CP CALC</p>
        </div>
    </div>

    <div class="space-y-3 mb-4">
        <div class="relative">
            <input type="text" id="pkmnSearch" placeholder="Search Pokemon..." class="w-full h-14 bg-[#1c1c22] rounded-2xl px-6 text-white outline-none border border-white/5">
            <div id="searchResults" class="absolute z-50 w-full mt-2 bg-[#1c1c22] hidden rounded-xl border border-white/10 max-h-60 overflow-y-auto"></div>
        </div>
        <input type="number" id="currentCP" placeholder="Current CP" class="w-full h-14 bg-[#1c1c22] rounded-xl px-4 text-white text-center font-bold outline-none border border-white/5">
    </div>

    <div id="pkmnHeader" class="genie-card p-4 mb-4 flex items-center gap-4">
        <div class="w-16 h-16 bg-[#25252b] rounded-2xl flex items-center justify-center text-blue-400"><i data-lucide="crosshair" class="w-8 h-8"></i></div>
        <div class="flex-1">
            <h1 id="pkmnName" class="text-xl font-black italic uppercase">Select Pokemon</h1>
            <p id="statsDisplay" class="text-[10px] text-slate-500 font-bold uppercase">Base Stats: -- / -- / --</p>
        </div>
    </div>

    <div class="genie-card p-5 space-y-4 mb-4">
        <div class="relative pt-6">
            <div class="flex justify-between text-[10px] font-black text-red-500 uppercase absolute top-1 w-full"><span>Attack</span><span id="atkVal" class="text-lg">15</span></div>
            <div class="relative h-8"><div class="iv-bar-bg"><div id="atkFill" class="iv-bar-fill bg-red-600" style="width: 100%"></div></div><input type="range" id="atkIn" min="0" max="15" value="15"></div>
        </div>
        <div class="relative pt-6">
            <div class="flex justify-between text-[10px] font-black text-blue-500 uppercase absolute top-1 w-full"><span>Defense</span><span id="defVal" class="text-lg">15</span></div>
            <div class="relative h-8"><div class="iv-bar-bg"><div id="defFill" class="iv-bar-fill bg-blue-600" style="width: 100%"></div></div><input type="range" id="defIn" min="0" max="15" value="15"></div>
        </div>
        <div class="relative pt-6">
            <div class="flex justify-between text-[10px] font-black text-yellow-500 uppercase absolute top-1 w-full"><span>Stamina</span><span id="staVal" class="text-lg">15</span></div>
            <div class="relative h-8"><div class="iv-bar-bg"><div id="staFill" class="iv-bar-fill bg-yellow-600" style="width: 100%"></div></div><input type="range" id="staIn" min="0" max="15" value="15"></div>
        </div>
    </div>

    <div class="genie-card p-5 border-l-4 border-amber-500 shadow-lg">
        <p class="text-[10px] font-black text-amber-500 uppercase mb-1">Target Calculator</p>
        <div class="flex items-baseline gap-2">
            <p id="targetCP" class="text-4xl font-black italic">CP --</p>
            <p id="targetLevelText" class="text-xs text-slate-400 font-bold">Lv --</p>
        </div>
        <input type="range" id="levelSlider" class="w-full mt-4" min="1" max="51" step="0.5" value="1">
    </div>

    <script>
        let pokemonDB = [], activePkmn = null;

        async function init() {
            try {
                const response = await fetch('https://pogoapi.net/api/v1/pokemon_stats.json');
                pokemonDB = await response.json();
                lucide.createIcons();
            } catch (err) { console.error("Database error"); }
        }

        function calculateCP(pkmn, a, d, s, level) {
            // Simplified CPM placeholder to match your original structure
            const m = 0.7903; 
            return Math.floor((pkmn.base_attack + a) * Math.sqrt(pkmn.base_defense + d) * Math.sqrt(pkmn.base_stamina + s) * (m*m) / 10);
        }

        function updateUI() {
            if (!activePkmn) return;
            const a = parseInt(document.getElementById('atkIn').value);
            const d = parseInt(document.getElementById('defIn').value);
            const s = parseInt(document.getElementById('staIn').value);
            const l = parseFloat(document.getElementById('levelSlider').value);
            document.getElementById('targetCP').innerText = `CP ${calculateCP(activePkmn, a, d, s, l)}`;
            document.getElementById('targetLevelText').innerText = `Lv ${l}`;
        }

        document.getElementById('pkmnSearch').addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase(), res = document.getElementById('searchResults');
            if (q.length < 2) { res.classList.add('hidden'); return; }
            const matches = pokemonDB.filter(p => p.pokemon_name.toLowerCase().includes(q)).slice(0, 10);
            res.innerHTML = matches.map(p => `<div class="p-4 border-b border-white/5" onclick="pick('${p.pokemon_name}')">${p.pokemon_name}</div>`).join('');
            res.classList.remove('hidden');
        });

        window.pick = (name) => {
            activePkmn = pokemonDB.find(p => p.pokemon_name === name);
            document.getElementById('pkmnName').innerText = activePkmn.pokemon_name;
            document.getElementById('statsDisplay').innerText = `Base: ${activePkmn.base_attack} / ${activePkmn.base_defense} / ${activePkmn.base_stamina}`;
            document.getElementById('searchResults').classList.add('hidden');
            document.getElementById('pkmnSearch').value = "";
            updateUI();
        };

        ['atkIn', 'defIn', 'staIn', 'levelSlider'].forEach(id => {
            document.getElementById(id).addEventListener('input', () => {
                if(id !== 'levelSlider') {
                    document.getElementById(id.replace('In', 'Val')).innerText = document.getElementById(id).value;
                    document.getElementById(id.replace('In', 'Fill')).style.width = (document.getElementById(id).value / 15 * 100) + "%";
                }
                updateUI();
            });
        });

        init();
    </script>
</body>
</html>
